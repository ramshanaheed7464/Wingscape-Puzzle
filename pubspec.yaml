name: wingscape_puzzle
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get:
  shared_preferences:
  flutter_svg: ^2.0.10+1
  audioplayers: ^6.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/icons/
    - assets/images/background/
    - assets/sounds/
  fonts:
    - family: Lobster
      fonts:
        - asset: assets/font/Lobster-Regular.ttf
